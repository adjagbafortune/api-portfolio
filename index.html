<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Portfolio Connecté à l'API GitHub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1 style="text-align: center;">Mes Projets GitHub (Intégration API Live)</h1>
    <p style="text-align: center;">Cette page web est connectée en temps réel à l'API GitHub pour afficher dynamiquement mes derniers dépôts publics.</p>

    <div class="controls-container">
        <input type="text" id="search-bar" class="search-input" placeholder="Rechercher un dépôt par nom ou langage..." disabled>
        <select id="sort-select" class="sort-select" disabled>
            <option value="updated">Dernière mise à jour</option>
            <option value="stars">Étoiles (Stars)</option>
            <option value="alpha">Nom (A - Z)</option>
        </select>
    </div>

    <div id="loader" class="loading">Connexion à l'API GitHub en cours...</div>
    <div id="repos-container" class="repo-grid"></div>

    <script src="script.js"></script>
</body>
</html>
